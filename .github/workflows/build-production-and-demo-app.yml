name: build-production-and-demo-app

on:
  workflow_dispatch:

jobs:
  build-all:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: indie-swift-compiler
    env:
      TOOLCHAIN_SCHEME: release/6.3
    steps:
      - uses: actions/checkout@v4
      - name: Sync minimal update-checkout repos (indie compiler)
        run: bash ./Scripts/bootstrap_minimal_toolchain_repos.sh "$TOOLCHAIN_SCHEME"
      - name: Build LLVM/Clang -> MiniSwiftCompilerCore -> Demo app (guaranteed order)
        run: bash ./Scripts/build_production_and_demo_app_pipeline.sh
      - name: Run MiniSwiftCompilerCore tests
        run: swift test --no-parallel
      - name: Upload demo app build inputs
        uses: actions/upload-artifact@v4
        with:
          name: DemoApp-build-inputs
          path: indie-swift-compiler/Release/DemoAppBuildInputs
      - name: Upload MiniSwiftCompilerCore release build
        uses: actions/upload-artifact@v4
        with:
          name: MiniSwiftCompilerCore-release
          path: indie-swift-compiler/.build
      - name: Upload LLVM release zip
        uses: actions/upload-artifact@v4
        with:
          name: LLVM-release
          path: indie-swift-compiler/Release/LLVM-21.1.6-iphoneos.zip
      - name: Upload Clang release zip
        uses: actions/upload-artifact@v4
        with:
          name: Clang-release
          path: indie-swift-compiler/Release/Clang-21.1.6-iphoneos.zip
