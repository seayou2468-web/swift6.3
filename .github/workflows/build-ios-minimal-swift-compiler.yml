name: build-ios-minimal-swift-compiler

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ios-minimal-swift-compiler.yml
      - Makefile
      - swift/utils/build-presets.ini

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Update checkout to Swift 6.3-compatible revisions
        run: python3 ./swift/utils/update-checkout --scheme release/6.3 --clone --skip-history --skip-tags --reset-to-remote

      - name: Build the minimal iOS Swift compiler configuration
        run: "make swift-ios-minimal UPDATE_CHECKOUT=:"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-ios-minimal-deliverables
          path: |
            artifacts/ClangCxxSupport.xcframework
            artifacts/install/Library/Developer/Toolchains/SwiftMinimalIOS.xctoolchain
