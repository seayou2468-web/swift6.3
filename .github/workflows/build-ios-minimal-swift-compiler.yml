name: build-ios-minimal-swift-compiler

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ios-minimal-swift-compiler.yml
      - Makefile
      - swift/utils/build-presets.ini
      - swift/utils/update_checkout/update_checkout/update_checkout.py
      - swift/utils/update_checkout/update_checkout/cli_arguments.py

jobs:
  build:
    runs-on: macos-latest
    env:
      XCODE_VERSION: 26.1.1
      UPDATE_CHECKOUT_SCHEME: release/6.3
      CMAKE_VERSION: 3.30.2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install pinned CMake version for Swift 6.3
        run: |
          python3 -m venv .cmake-venv
          . .cmake-venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install "cmake==${CMAKE_VERSION}"
          echo "$PWD/.cmake-venv/bin" >> "$GITHUB_PATH"
          export PATH="$PWD/.cmake-venv/bin:$PATH"
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess

          config = json.loads(pathlib.Path('swift/utils/update_checkout/update-checkout-config.json').read_text())
          expected = config['branch-schemes']['release/6.3']['repos']['cmake'].removeprefix('v')
          pinned = os.environ['CMAKE_VERSION']
          actual_output = subprocess.check_output(['cmake', '--version'], text=True)
          match = re.search(r'cmake version (\d+\.\d+\.\d+)', actual_output)
          if match is None:
              raise SystemExit(f'Unable to parse cmake version from: {actual_output}')
          actual = match.group(1)

          if pinned != expected:
              raise SystemExit(
                  f'Pinned CMake {pinned} does not match Swift 6.3 expected version ({expected}).')
          if actual != pinned:
              raise SystemExit(
                  f'Installed CMake {actual} does not match pinned version ({pinned}).')

          print(f'Swift 6.3 expects CMake {expected}; pinned and installed version is {actual}.')
          PY

      - name: Restore update-checkout source cache
        uses: actions/cache@v4
        with:
          path: |
            cmark
            llbuild
            llvm-project
            swift-*
            sourcekit-lsp
            indexstore-db
            cmake
            ninja
            yams
            curl
            libxml2
            zlib
            brotli
            wasi-libc
            wasmkit
          key: update-checkout-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ env.UPDATE_CHECKOUT_SCHEME }}-${{ hashFiles('swift/utils/update_checkout/update-checkout-config.json', 'swift/utils/update_checkout/update_checkout/update_checkout.py', 'swift/utils/update_checkout/update_checkout/cli_arguments.py') }}
          restore-keys: |
            update-checkout-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ env.UPDATE_CHECKOUT_SCHEME }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            build
            artifacts/toolchain-install-root
          key: build-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('Makefile', 'swift/utils/build-presets.ini', '.github/workflows/build-ios-minimal-swift-compiler.yml', 'swift/utils/update_checkout/update_checkout/update_checkout.py', 'swift/utils/update_checkout/update_checkout/cli_arguments.py') }}
          restore-keys: |
            build-${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-

      - name: Ensure swift/utils scripts are executable
        run: python3 ./scripts/ensure_exec_bits.py --root ./swift/utils

      - name: Update checkout to Swift 6.3-compatible revisions
        run: python3 ./swift/utils/update-checkout --scheme "${UPDATE_CHECKOUT_SCHEME}" --clone --skip-history --skip-tags --reset-to-remote --skip-repository swift

      - name: Build the minimal iOS Swift compiler configuration
        run: "make swift-ios-minimal UPDATE_CHECKOUT=: BUILD_JOBS=$(sysctl -n hw.logicalcpu)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-ios-minimal-deliverables
          path: |
            artifacts/LLVM.xcframework
            artifacts/Clang.xcframework
            artifacts/Swift.xcframework
            artifacts/toolchain-install-root/SwiftMinimalIOS.xctoolchain
