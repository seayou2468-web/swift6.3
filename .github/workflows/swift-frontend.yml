name: Swift Frontend XCFramework Build

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: "Branch scheme (e.g. release/6.3)"
        required: false
        default: "release/6.3"
  push:
    branches:
      - work
    paths:
      - "indie-swift-compiler/Scripts/build_swift_frontend_xcframework.sh"
      - "indie-swift-compiler/Scripts/build_swift_frontend_embedded_stub.sh"
      - "indie-swift-compiler/Scripts/bootstrap_minimal_toolchain_repos.sh"
      - "indie-swift-compiler/Config/minimal-update-checkout-config.json"
      - ".github/workflows/swift-frontend.yml"

concurrency:
  group: swift-frontend-xcframework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swift-frontend:
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: indie-swift-compiler

    env:
      SCHEME: ${{ github.event.inputs.scheme || 'release/6.3' }}
      NSUnbufferedIO: "YES"
      CCACHE_DIR: ${{ github.workspace }}/indie-swift-compiler/.build/ccache
      CCACHE_MAXSIZE: "2G"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1.1"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-swift-frontend-ccache-${{ github.ref_name }}-${{ github.event.inputs.scheme || 'release/6.3' }}
          restore-keys: |
            ${{ runner.os }}-swift-frontend-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-swift-frontend-ccache-

      - name: Restore toolchain workspace cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/indie-swift-compiler/.toolchain-workspace
          key: ${{ runner.os }}-swift-frontend-workspace-${{ github.event.inputs.scheme || 'release/6.3' }}-${{ hashFiles('indie-swift-compiler/Config/minimal-update-checkout-config.json', 'indie-swift-compiler/Scripts/bootstrap_minimal_toolchain_repos.sh', 'indie-swift-compiler/Tools/sync_toolchain_repos.py') }}
          restore-keys: |
            ${{ runner.os }}-swift-frontend-workspace-${{ github.event.inputs.scheme || 'release/6.3' }}-
            ${{ runner.os }}-swift-frontend-workspace-

      - name: Prime ccache stats
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --zero-stats || true
            ccache --show-config || true
          else
            echo "ccache is not available on this runner; continuing without compiler cache."
          fi

      - name: Bootstrap minimal toolchain repos
        run: |
          ./Scripts/bootstrap_minimal_toolchain_repos.sh "$SCHEME" ./.toolchain-workspace

      - name: Build embedded frontend archive
        run: |
          mkdir -p ./.build
          ./Scripts/build_swift_frontend_embedded_stub.sh > ./.build/swift-frontend-embedded.env

      - name: Build Swift frontend XCFramework
        run: |
          source ./.build/swift-frontend-embedded.env
          export SWIFT_FRONTEND_EMBEDDED_LIB_IOS
          ./Scripts/build_swift_frontend_xcframework.sh

      - name: Show ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats || true
          fi

      - name: Upload Swift frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-frontend-artifacts-${{ github.run_number }}
          path: |
            indie-swift-compiler/Artifacts/SwiftFrontend.xcframework/**
            indie-swift-compiler/Artifacts/EmbeddedFrontend/**
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
