name: Release Toolchain Build

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: "Branch scheme (e.g. release/6.3)"
        required: false
        default: "release/6.3"
  push:
    branches:
      - work
    paths:
      - "indie-swift-compiler/**"
      - ".github/workflows/release-toolchain.yml"

concurrency:
  group: release-toolchain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: indie-swift-compiler

    env:
      SCHEME: ${{ github.event.inputs.scheme || 'release/6.3' }}
      REQUIRED_XCODE_VERSION: "26.1.1"
      ALLOW_RUNTIME_FAILURE: "1"
      BUILD_ID: ${{ github.run_number }}-${{ github.run_attempt }}
      NSUnbufferedIO: "YES"
      CCACHE_DIR: ${{ github.workspace }}/indie-swift-compiler/.build/ccache
      CCACHE_MAXSIZE: "2G"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1.1"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-swift-toolchain-ccache-${{ github.ref_name }}-${{ github.event.inputs.scheme || 'release/6.3' }}
          restore-keys: |
            ${{ runner.os }}-swift-toolchain-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-swift-toolchain-ccache-

      - name: Prime ccache stats
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --zero-stats || true
            ccache --show-config || true
          else
            echo "ccache is not available on this runner; continuing without compiler cache."
          fi

      - name: Ordered release build
        run: |
          ./Scripts/ci_release_ordered_build.sh "$SCHEME"

      - name: Show ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats || true
          fi

      - name: Upload Artifacts directory
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-artifacts-${{ github.run_number }}
          path: |
            indie-swift-compiler/Artifacts/**
            indie-swift-compiler/Dist/**
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
