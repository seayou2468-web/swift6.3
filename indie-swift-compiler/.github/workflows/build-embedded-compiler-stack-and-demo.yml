name: build-embedded-compiler-stack-and-demo

on:
  workflow_dispatch:

jobs:
  build-stack-and-demo:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: indie-swift-compiler
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build toolchain stack and compiler
        run: ./Scripts/build_embedded_compiler_stack.sh
      - name: Build EmbeddedCompilerIDE app
        run: ./Scripts/build_embedded_compiler_demo_app.sh
      - name: Upload LLVM release zip
        uses: actions/upload-artifact@v4
        with:
          name: LLVM-release
          path: indie-swift-compiler/Release/LLVM-21.1.6-iphoneos.zip
      - name: Upload Clang release zip
        uses: actions/upload-artifact@v4
        with:
          name: Clang-release
          path: indie-swift-compiler/Release/Clang-21.1.6-iphoneos.zip
      - name: Upload demo app build products
        uses: actions/upload-artifact@v4
        with:
          name: EmbeddedCompilerIDE-build
          path: ~/Library/Developer/Xcode/DerivedData
