name: manual-toolchain-release

on:
  workflow_dispatch:

jobs:
  build-release-artifacts:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: indie-swift-compiler
    steps:
      - uses: actions/checkout@v4
      - name: Build standalone LLVM/Clang release artifacts
        run: make manual-release
      - name: Upload LLVM release zip
        uses: actions/upload-artifact@v4
        with:
          name: LLVM-release
          path: indie-swift-compiler/Release/LLVM-21.1.6-iphoneos.zip
      - name: Upload Clang release zip
        uses: actions/upload-artifact@v4
        with:
          name: Clang-release
          path: indie-swift-compiler/Release/Clang-21.1.6-iphoneos.zip
